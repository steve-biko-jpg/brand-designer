<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steve Brand Strategist</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <h2 class="title">Register Your Business</h2>
        <p class="subtitle">Fill out the form below to register your business with our brand strategy services.</p>
        <form>
            <fieldset class="business-info">
                <legend>Business Information</legend>
                <label for="business-name">Business Name:</label>
                <input type="text" id="business-name" name="business-name" required>
                <label for="business-email">Email:</label>
                <input type="email" id="business-email" name="business-email" required>
                <label for="address">Address:</label>
                <input type="text" id="address" name="address">
                <label for="phone-number">Phone Number:</label>
                <input type="tel" id="phone-number" name="phone-number">
                <label for="website">Website:</label>
                <input type="url" id="website" name="website">
                <label for="industry">Industry:</label>
                <input type="text" id="industry" name="industry">
            </fieldset>
            <fieldset class="business-persona">
                <legend>Business Persona</legend>
                <label for="persona-description">Describe your business assuming it has a distinct personality using at least 3 adjectives:</label>
                <textarea id="persona-description" name="persona-description" rows="4" required></textarea>
                <label for="business-purpose">What is the primary purpose of your business?</label>
                <textarea id="business-purpose" name="business-purpose" rows="4" required></textarea>
                <label for="business-mission">What is the mission of your business?</label>
                <textarea id="business-mission" name="business-mission" rows="4" required></textarea>
                <label for="business-vision">What is the vision of your business?</label>
                <textarea id="business-vision" name="business-vision" rows="4" required></textarea>
                <label for="business-values">What are the core values of your business?</label>
                <textarea id="business-values" name="business-values" rows="4" required></textarea>
            </fieldset>
            <fieldset class="competitor-watch">
                <legend>Competition</legend>
                <label for="competitor-analysis">Who are your main competitors:</label>
                <textarea id="competitor-analysis" name="competitor-analysis" rows="4" required></textarea>
                <label for="competitive-advantage">What do you think you offer that is unique and other competitors do not?</label>
                <textarea id="competitive-advantage" name="competitive-advantage" rows="4" required></textarea>
            </fieldset>
            <fieldset class="customer-persona">
                <legend>Customer Persona</legend>
                <label for="target-audience">What is the kind of customer you are targeting?</label>
                <textarea id="target-audience" name="target-audience" rows="4" required></textarea>
                <label for="customer-needs">What are the needs of your target audience?</label>
                <textarea id="customer-needs" name="customer-needs" rows="4" required></textarea>
                <label for="customer-pain-points">What are the pain points of your target audience?</label>
                <textarea id="customer-pain-points" name="customer-pain-points" rows="4" required></textarea>
            </fieldset>
            <fieldset class="design-ideas">
                <legend>Design Ideas</legend>
                <label for="design-preferences">Do you have any design preferences or ideas for your brand?</label>
                <textarea id="design-preferences" name="design-preferences" rows="4"></textarea>
                <label for="color-scheme">Do you have a preferred color scheme for your brand?</label>
                <input type="text" id="color-scheme" name="color-scheme">
                <label for="logo-ideas">Do you have any ideas for your logo?</label>
                <textarea id="logo-ideas" name="logo-ideas" rows="4"></textarea>
                <label for="font-preferences">Do you have any font preferences for your brand?</label>
                <input type="text" id="font-preferences" name="font-preferences">
            </fieldset>
            <fieldset class="branding">
                <legend>Branding</legend>
                <label for="brand-story">What is the story behind your brand?</label>
                <textarea id="brand-story" name="brand-story" rows="4"></textarea>
                <label for="brand-personality">How would you describe the personality of your brand?</label>
                <textarea id="brand-personality" name="brand-personality" rows="4"></textarea>
                <label for="brand-tone">What tone do you want your brand to convey (e.g., professional, friendly, playful)?</label>
                <input type="text" id="brand-tone" name="brand-tone">
                <label for="brand-imagery">Do you have any specific imagery or symbols you want to incorporate into your brand?</label>
                <textarea id="brand-imagery" name="brand-imagery" rows="4"></textarea>
                <label for="brand-messaging">Do you have any specific messaging or slogans you want to use for your brand?</label>  
                <textarea id="brand-messaging" name="brand-messaging" rows="4"></textarea>
            </fieldset>
            <fieldset class="inspiration">
                <legend>Inspiration</legend>
                <label for="internal-inspiration">Do you have any brand within your industry that inspires you?</label>
                <textarea id="internal-inspiration" name="internal-inspiration" rows="4"></textarea>
                <label for="external-inspiration">Do you have any brand outside your industry that inspires you?</label>
                <textarea id="external-inspiration" name="external-inspiration" rows="4"></textarea>
            </fieldset>
            <fieldset class="marketing">
                <legend>Marketing</legend>
                <label for="marketing-strategy">What is your marketing strategy for your brand?</label>
                <textarea id="marketing-strategy" name="marketing-strategy" rows="4"></textarea>
                <label for="marketing-channels">What marketing channels do you plan to use to promote your brand (e.g., social media, email marketing, influencer marketing)?</label>
                <textarea id="marketing-channels" name="marketing-channels" rows="4"></textarea>
                <label for="marketing-budget">What is your marketing budget for your brand?</label>
                <input type="text" id="marketing-budget" name="marketing-budget">
            </fieldset>
            <fieldset class="additional-info">
                <legend>Additional Information</legend>
                <label for="additional-info">Is there any additional information you would like to provide about your business or brand?</label>
                <textarea id="additional-info" name="additional-info" rows="4"></textarea>
            </fieldset>
            <input type="submit" value="Submit">
        </form>
    </main>
</body>

</html>
